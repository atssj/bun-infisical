<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Diagonal gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbf0df;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a4fcf;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Subtle pattern for texture -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#5a4fcf" opacity="0.08"/>
    </pattern>
    
    <!-- Shadow filter -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Decorative geometric shapes - top left -->
  <g opacity="0.15">
    <circle cx="80" cy="80" r="120" fill="#5a4fcf"/>
    <circle cx="40" cy="40" r="60" fill="#fbf0df"/>
  </g>
  
  <!-- Decorative geometric shapes - bottom right -->
  <g opacity="0.12">
    <circle cx="1150" cy="550" r="180" fill="#fbf0df"/>
    <circle cx="1180" cy="580" r="90" fill="#5a4fcf"/>
  </g>
  
  <!-- Speed lines suggesting fast runtime (left side) -->
  <g opacity="0.2">
    <line x1="150" y1="250" x2="300" y2="250" stroke="#5a4fcf" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="270" x2="280" y2="270" stroke="#5a4fcf" stroke-width="2" stroke-linecap="round"/>
    <line x1="170" y1="290" x2="320" y2="290" stroke="#5a4fcf" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="140" y1="310" x2="260" y2="310" stroke="#5a4fcf" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="180" y1="330" x2="290" y2="330" stroke="#5a4fcf" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Speed lines right side -->
  <g opacity="0.15">
    <line x1="900" y1="250" x2="1050" y2="250" stroke="#fbf0df" stroke-width="3" stroke-linecap="round"/>
    <line x1="920" y1="280" x2="1080" y2="280" stroke="#fbf0df" stroke-width="2" stroke-linecap="round"/>
    <line x1="880" y1="310" x2="1040" y2="310" stroke="#fbf0df" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Docker container icon representation - abstract -->
  <g transform="translate(180, 420)" opacity="0.25">
    <!-- Container base -->
    <rect x="0" y="20" width="100" height="60" rx="8" fill="#5a4fcf"/>
    <!-- Container blocks -->
    <rect x="10" y="30" width="20" height="15" rx="2" fill="#fbf0df" opacity="0.6"/>
    <rect x="35" y="30" width="20" height="15" rx="2" fill="#fbf0df" opacity="0.6"/>
    <rect x="60" y="30" width="20" height="15" rx="2" fill="#fbf0df" opacity="0.6"/>
    <rect x="10" y="50" width="20" height="15" rx="2" fill="#fbf0df" opacity="0.6"/>
    <rect x="35" y="50" width="20" height="15" rx="2" fill="#fbf0df" opacity="0.6"/>
    <rect x="60" y="50" width="20" height="15" rx="2" fill="#fbf0df" opacity="0.6"/>
  </g>
  
  <!-- Shield/Security icon - right side -->
  <g transform="translate(920, 380)" opacity="0.2">
    <path d="M50 10 L90 30 L90 60 Q90 85 50 100 Q10 85 10 60 L10 30 Z" fill="#1a1a2e"/>
    <path d="M50 25 L75 40 L75 60 Q75 75 50 85 Q25 75 25 60 L25 40 Z" fill="#5a4fcf"/>
  </g>
  
  <!-- Bun-inspired accent circles -->
  <g opacity="0.3">
    <ellipse cx="280" cy="200" rx="15" ry="8" fill="#f5d69a"/>
    <ellipse cx="320" cy="190" rx="12" ry="6" fill="#f5d69a"/>
    <ellipse cx="300" cy="180" rx="10" ry="5" fill="#f5d69a"/>
  </g>
  
  <!-- Connection line between Bun and Infisical -->
  <g opacity="0.4">
    <line x1="520" y1="280" x2="680" y2="280" stroke="#5a4fcf" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="600" cy="280" r="8" fill="#5a4fcf" opacity="0.6"/>
    <circle cx="600" cy="280" r="4" fill="#fbf0df"/>
  </g>
  
  <!-- Main content group -->
  <g filter="url(#softShadow)">
    <!-- Main title: Bun + Infisical -->
    <text x="600" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="-1">
      Bun + Infisical
    </text>
    
    <!-- Subtitle: Docker Image -->
    <text x="600" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#5a4fcf" text-anchor="middle" letter-spacing="2" opacity="0.9">
      Docker Image
    </text>
    
    <!-- Tagline with decorative elements -->
    <g>
      <!-- Left decorative line -->
      <line x1="420" y1="400" x2="500" y2="400" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
      <!-- Right decorative line -->
      <line x1="700" y1="400" x2="780" y2="400" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
      
      <text x="600" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#1a1a2e" text-anchor="middle" opacity="0.8">
        Fast Runtime · Secure Secrets
      </text>
    </g>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="350" y="480" width="500" height="4" rx="2" fill="#5a4fcf" opacity="0.3"/>
  
  <!-- Corner accents -->
  <g opacity="0.2">
    <!-- Top right corner -->
    <path d="M1050 50 L1100 50 L1100 100" stroke="#5a4fcf" stroke-width="3" fill="none"/>
    <!-- Bottom left corner -->
    <path d="M150 580 L100 580 L100 530" stroke="#5a4fcf" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Subtle grid pattern overlay for tech feel -->
  <g opacity="0.03">
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#1a1a2e" stroke-width="1"/>
  </g>
</svg>
